<body class="dark-theme">
    <div class="container">
        <div class="card header">
            <div>
                <h1>BCSO Procédures</h1>
            </div>
        </div>
        <div class="card" style="margin-top:16px;">
            <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;">
                <button class="btn btn-gold btn-sm" onclick="procSetTab('mandat')">📜 Mandat</button>
                <button class="btn btn-outline btn-sm" onclick="procSetTab('casier')">🗂️ Casier judiciaire</button>
                <button class="btn btn-outline btn-sm" onclick="procSetTab('affaire')">📑 Affaire classée</button>
                <div style="flex:1;min-width:180px;"><input id="proc-search" type="text"
                        placeholder="🔎 Rechercher une infraction..." oninput="procSearch(this.value)"></div>
                <button class="btn btn-outline btn-sm" onclick="procShowMiranda()">📜 Droits Miranda</button>
                <button class="btn btn-outline btn-sm" onclick="procReset()">🗑️ Reset</button>
                <button class="btn btn-outline btn-sm" id="theme-toggle" onclick="procToggleTheme()">🌙 Mode
                    sombre</button>
            </div>
        </div>
        <div class="grid" style="margin-top:16px;">
            <div class="list-card" id="proc-list"></div>
            <div class="panel-card" id="proc-panel"></div>
        </div>
    </div>

    <div id="miranda-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>📜 Droits Miranda</h2>
            <pre id="miranda-text"></pre>
            <button class="btn btn-gold" onclick="closeMirandaModal()">OK</button>
        </div>
    </div>
